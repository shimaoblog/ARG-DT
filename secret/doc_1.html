        <h2>关于异常信号的初步分析报告</h2>
        <p>1999年8月7日，灯塔一号探测器在距离地球27.3天文单位处，接收到一段持续72小时的未知射电信号。</p>
        <p>信号频率为1420MHz，对应氢原子谱线，为宇宙中公认的文明通讯频率。</p>
        <p>经初步破译，信号内容为重复的警告信息，明确指示地球文明不要向深空发送回应信号，不要暴露自身坐标。</p>
        <p>信号来源方向暂无法确定，不排除为探测器附近未知文明发出。</p>
        <p>第二部分文档密钥：凯撒密码，偏移量为探测器编号，解密「kwr_2_gxp2kw.html」即可访问。</p>
