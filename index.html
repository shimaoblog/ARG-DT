        <h2>欢迎访问</h2>
        <p>这里是国家深空探测局「灯塔计划」官方存档网站。</p>
        <p>灯塔一号探测器于1994年10月24日发射升空，承载着人类寻找地外文明的使命，向宇宙深处发送地球文明的问候。</p>
        <p>2001年8月15日，探测器因能源耗尽正式失联，项目圆满终止。本站点留存项目全部公开资料，供公众查阅。</p>
        
        <h2>最新公告</h2>
        <div class="log-item">
            <p class="date">2001-09-01</p>
            <p>存档站正式上线，所有公开资料已完成归档。</p>
        </div>
        <div class="log-item">
            <p class="date">2001-08-16</p>
            <p>项目组召开总结大会，表彰全体工作人员十七年的付出。</p>
        </div>
    </div>
