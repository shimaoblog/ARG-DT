        <p class="date">1999年8月7日</p>
        <h2>观测日志 · 私人记录</h2>
        <p>今天收到了回波。</p>
        <p>不是我们发出去的信号反射，是主动发来的。频率完全不对，不在任何预定的接收频段里。</p>
        <p>组长说先不要上报，再观察几天。我心里慌得很。</p>
        <p>探测器离地球已经27个天文单位了，怎么可能有人在那个位置发信号？</p>
        <p>下一篇日志的编号，是项目立项的月份加日期。</p>
        <p>记得，不要用公开的路径。</p>

        <p style="margin-top:30px;color:#808080;font-size:14px;">—— 张工 记</p>
