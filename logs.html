    <div class="content">
        <h2>项目大事记</h2>
        
        <div class="log-item">
            <p class="date">1987年3月19日</p>
            <p>【第1号】项目正式立项，成立专项工作组。</p>
        </div>
        <div class="log-item">
            <p class="date">1994年10月24日</p>
            <p>【第9号】灯塔一号探测器成功发射，进入预定轨道。</p>
        </div>
        <div class="log-item">
            <p class="date">1997年5月12日</p>
            <p>【第9号】探测器飞越冥王星，传回首批深空影像。</p>
        </div>
        <div class="log-item">
            <p class="date">1999年8月7日</p>
            <p>【第0号】探测器运行状态良好，持续向深空发送信号。</p>
        </div>
        <div class="log-item">
            <p class="date">2001年8月15日</p>
            <p>【第8号】探测器正式失联，项目圆满结束。</p>
        </div>

        <p class="tip">提示：机密文档需要身份验证，入口已被移除。老员工都记得，密码是那天的日期。</p>
    </div>
